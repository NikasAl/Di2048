buildscript {
    repositories {
        mavenLocal()
        mavenCentral()
        maven { url "https://oss.sonatype.org/content/repositories/snapshots/" }
        jcenter()
    }
    dependencies {
        classpath 'de.richsource.gradle.plugins:gwt-gradle-plugin:0.6'
        classpath 'com.android.tools.build:gradle:1.5.0'
    }
}

allprojects {
    apply plugin: "eclipse"
    apply plugin: "idea"

    version = '1.0'
    ext {
        appName = "Di2048"
        gdxVersion = '1.9.3'
        roboVMVersion = '2.1.0'
        box2DLightsVersion = '1.4'
        ashleyVersion = '1.7.0'
        aiVersion = '1.8.0'
    }

    repositories {
        mavenLocal()
        mavenCentral()
        maven { url "https://oss.sonatype.org/content/repositories/snapshots/" }
        maven { url "https://oss.sonatype.org/content/repositories/releases/" }

        flatDir {
            dirs project(':android').file('aar')
        }
    }
}

project(":desktop") {
    apply plugin: "java"


    dependencies {
        compile project(":core")
        compile "com.badlogicgames.gdx:gdx-backend-lwjgl:$gdxVersion"
        compile "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-desktop"
    }
}

project(":android") {
    apply plugin: "android"

    configurations { natives }

    dependencies {
        compile project(":core")
//        compile "com.google.android.gms:play-services-analytics:7.3.0"
        compile "com.badlogicgames.gdx:gdx-backend-android:$gdxVersion"
        natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-armeabi"
        natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-armeabi-v7a"
        natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-arm64-v8a"
        natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86"
        natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86_64"

        compile 'com.google.android.gms:play-services-ads:8.4.0'
        compile 'com.google.android.gms:play-services-location:8.4.0'

        compile fileTree(dir: 'libs', include: '*.jar')
        compile 'com.squareup.picasso:picasso:2.5.2' //for Inmobi
        compile name: 'adcolony-sdk-3.2.1', ext: 'aar'
        compile name: 'mmedia-6.4.0', ext: 'aar'
        compile name: 'mobvista-8.3.7-alphab', ext: 'aar'
        compile name: 'mobvista-8.3.7-appwall', ext: 'aar'
        compile name: 'mobvista-8.3.7-appwallext', ext: 'aar'
        compile name: 'mobvista-8.3.7-common', ext: 'aar'
        compile name: 'mobvista-8.3.7-interstitial', ext: 'aar'
        compile name: 'mobvista-8.3.7-mvdownloads', ext: 'aar'
        compile name: 'mobvista-8.3.7-mvjscommon', ext: 'aar'
        compile name: 'mobvista-8.3.7-mvnative', ext: 'aar'
        compile name: 'mobvista-8.3.7-nativeex', ext: 'aar'
        compile name: 'mobvista-8.3.7-offerwall', ext: 'aar'
        compile name: 'mobvista-8.3.7-playercommon', ext: 'aar'
        compile name: 'mobvista-8.3.7-reward', ext: 'aar'
        compile name: 'mobvista-8.3.7-videocommon', ext: 'aar'
        compile name: 'mobvista-8.3.7-videofeeds', ext: 'aar'
    }
}


buildscript {
    repositories {
        mavenLocal()
        mavenCentral()
        maven { url "https://oss.sonatype.org/content/repositories/snapshots/" }
        jcenter()
        google()
    }
    dependencies {
//        classpath 'de.richsource.gradle.plugins:gwt-gradle-plugin:0.6'
        classpath 'com.android.tools.build:gradle:3.4.2'
    }
}

allprojects {
    apply plugin: "eclipse"
    apply plugin: "idea"

    version = '1.0'
    ext {
        appName = "Di2048"
        gdxVersion = '1.9.10'
        roboVMVersion = '2.1.0'
        box2DLightsVersion = '1.4'
        ashleyVersion = '1.7.0'
        aiVersion = '1.8.0'
    }

    repositories {
        maven { url "https://artifactory.appodeal.com/appodeal" }

        mavenLocal()
        mavenCentral()
        maven { url "https://dl.bintray.com/cachapa/maven/" }
        maven { url "https://maven.google.com" }
        jcenter()
        google()
        maven { url "https://oss.sonatype.org/content/repositories/snapshots/" }
        maven { url "https://oss.sonatype.org/content/repositories/releases/" }

        flatDir {
            dirs project(':android').file('aar')
        }
    }
}

project(":desktop") {
    apply plugin: "java"


    dependencies {
        compile project(":core")
        compile "com.badlogicgames.gdx:gdx-backend-lwjgl:$gdxVersion"
        compile "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-desktop"
    }
}

project(":android") {
    apply plugin: "android"

    configurations { natives }

    dependencies {
        compile project(":core")
//        compile "com.google.android.gms:play-services-analytics:7.3.0"
        compile "com.badlogicgames.gdx:gdx-backend-android:$gdxVersion"
        natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-armeabi"
        natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-armeabi-v7a"
        natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-arm64-v8a"
        natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86"
        natives "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86_64"

        compile 'com.google.android.gms:play-services-ads:15.0.1'
        compile 'com.google.android.gms:play-services-location:15.0.1'

        compile 'com.appodeal.ads:nodex:2.5.6'

        implementation 'com.appodeal.optional:flurry-ads:11.6.0'
        implementation 'com.appodeal.optional:flurry-analytics:11.6.0'
        implementation 'com.google.android.exoplayer:exoplayer-core:2.8.4'
        implementation 'com.google.android.exoplayer:exoplayer-hls:2.8.4'
        implementation 'com.android.support:support-v4:26.1.0'
        implementation 'com.android.support:recyclerview-v7:26.1.0'

        compile fileTree(dir: 'libs', include: '*.jar')
    }
}

